<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LiveStyle Sync — настройки</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 24px; }
    h1 { font-size: 18px; margin-bottom: 16px; }
    h2 { font-size: 14px; margin: 20px 0 8px; }
    label { display: block; margin-bottom: 4px; font-size: 13px; }
    input[type="text"] { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 12px; }
    input[type="checkbox"] { margin-right: 8px; }
    button { padding: 8px 16px; background: #0078d4; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin-right: 8px; margin-bottom: 8px; }
    button:hover { background: #106ebe; }
    button.secondary { background: #555; }
    button.secondary:hover { background: #333; }
    .saved { margin-left: 10px; color: #107c10; font-size: 13px; }
    #debugLog { font-family: monospace; font-size: 12px; background: #1e1e1e; color: #d4d4d4; padding: 12px; max-height: 300px; overflow: auto; white-space: pre-wrap; word-break: break-all; border-radius: 4px; }
    .debug-actions { margin-top: 8px; }
  </style>
</head>
<body>
  <h1>LiveStyle Sync — настройки</h1>
  <label for="wsUrl">URL WebSocket редактора (Cursor/VS Code)</label>
  <input type="text" id="wsUrl" placeholder="ws://127.0.0.1:8765">
  <button id="save">Сохранить</button><span id="saved" class="saved"></span>

  <h2>Отладка</h2>
  <label><input type="checkbox" id="debugCheck"> Включить отладку (логи внизу)</label>
  <div class="debug-actions">
    <button id="refreshLog" class="secondary">Обновить лог</button>
    <button id="clearLog" class="secondary">Очистить</button>
  </div>
  <pre id="debugLog"></pre>
  <script src="options.js"></script>
</body>
</html>
