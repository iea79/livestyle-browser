name: Build LiveStyle browser extension

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Install dependencies
        working-directory: ./livestyle-browser
        run: |
          yarn install --frozen-lockfile || yarn install

      - name: Build CRX
        working-directory: ./livestyle-browser
        run: yarn build

      - name: Build unpacked extension
        working-directory: ./livestyle-browser
        run: yarn build:unpacked

